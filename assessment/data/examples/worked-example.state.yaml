# SYNTHETIC EXAMPLE — NOT MATTERMOST, NOT ANY REAL ORGANIZATION.
#
# Control state is only knowable inside the boundary, from systems of record.
# This file exists so the affirmation gate can be run, read, and attacked by
# someone who does not work here. It asserts nothing about anyone's posture.
#
# On day one this is not a file at all: it is computed by evidence gateways
# reading the IdP, AWS, GitHub, Jira and Drata, and every value carries
# ai_generated: false because a model never supplies an assessment outcome.

synthetic: true
source: "synthetic worked example — assessment/data/examples/"

# A POA&M inside its 180-day window. Move the date back past 180 days and the
# gate blocks the affirmation, which is the correct behavior: an expired POA&M
# is an unmet requirement wearing a plan.
poam:
  - {req: "3.3.5", opened: "2026-04-01", note: "SIEM correlation rollout"}

