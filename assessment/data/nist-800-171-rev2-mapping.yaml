# =============================================================================
# NIST SP 800-171 Rev 2 -> Living Control Set mapping. Single source of truth.
#
# Every rendered federal artifact in this repo (the assessment workbook, the
# engine crosswalk rows, the OSCAL profile selection) generates from this file,
# so the mapping is stated once and never drifts between views.
#
# BASIS (all primary, all verified):
#   - Requirement set: NIST SP 800-171 Rev 2 (the enforced baseline under the
#     2026-07-13 CMMC Phase II suspension; full official statements live in the
#     DoD CMMC Level 2 Assessment Guide v2). Names below are abbreviated
#     descriptors for readability, never replacement text.
#   - SPRS weights: NIST SP 800-171 DoD Assessment Methodology v1.2.1 Annex A,
#     parsed from the document itself and checksum-verified: 44 five-point
#     (two carry partial credit: 3.5.3 MFA and 3.13.11 FIPS), 14 three-point,
#     51 one-point, and 3.12.4 unscored (an absent SSP means the assessment
#     cannot be conducted at all). Total deductible 313 -> score range -203 to
#     +110, which reproduces the methodology's published range exactly.
#   - Traceability anchor: each mapping row names the NIST SP 800-53 control(s)
#     that 800-171 itself derives from; the engine control assigned carries an
#     overlapping 800-53 reference in control-library.yaml wherever one exists.
#     Rows resting on practitioner judgment rather than a shared 800-53 ref say
#     so in their note. Nothing here asserts Mattermost's implementation state:
#     status is assessed on day one, inside the boundary, from systems of record.
#
# FIELDS: id / name (abbreviated) / controls (Living Control Set IDs) /
#   anchor (shared 800-53 refs) / note (scoping, inheritance, judgment calls)
# =============================================================================

metadata:
  framework_key: nist_800_171
  framework_name: "NIST SP 800-171 Rev 2"
  requirement_count: 110
  scoring:
    methodology: "NIST SP 800-171 DoD Assessment Methodology v1.2.1"
    max_score: 110
    min_score: -203
    weights: {five_point: 44, three_point: 14, one_point: 51, unscored: 1}
    partial_credit:
      "3.5.3": "subtract 5 if no MFA; subtract 3 if implemented for remote and privileged users but not general users"
      "3.13.11": "subtract 5 if no cryptography; subtract 3 if employed but mostly not FIPS-validated"
  basis_checked: 2026-07-17

families:
  - family: "3.1"
    name: Access Control
    evidence_sources: "IdP (confirmed in discovery) and AWS IAM for account state; Drata access-review records; VPN/ZTNA configuration for remote access"
    requirements:
      - {id: 3.1.1, name: "Limit system access to authorized users, processes, and devices", controls: [IAM-01, IAC-17], anchor: "AC-2"}
      - {id: 3.1.2, name: "Limit system access to authorized transaction and function types", controls: [IAM-03], anchor: "AC-6 (least-privilege implementation of AC-3)", note: "judgment-adjacent: 800-171 derives this from AC-2/AC-3; the engine enforces it through least privilege"}
      - {id: 3.1.3, name: "Control the flow of CUI per approved authorizations", controls: [DCH-01, NET-01], anchor: "AC-4"}
      - {id: 3.1.4, name: "Separate duties of individuals to reduce malevolent-activity risk", controls: [GOV-03], anchor: "AC-5"}
      - {id: 3.1.5, name: "Employ least privilege, including for privileged accounts", controls: [IAM-03], anchor: "AC-6"}
      - {id: 3.1.6, name: "Use non-privileged accounts for non-security functions", controls: [IAM-03], anchor: "AC-6(2)"}
      - {id: 3.1.7, name: "Prevent non-privileged execution of privileged functions; audit such attempts", controls: [IAM-03, MON-01], anchor: "AC-6(9)/(10); AU-2"}
      - {id: 3.1.8, name: "Limit unsuccessful logon attempts", controls: [IAM-04], anchor: "AC-7"}
      - {id: 3.1.9, name: "Provide privacy and security notices for CUI systems", controls: [IAM-04], anchor: "AC-8", note: "judgment: system-use banners ride the authentication surface"}
      - {id: 3.1.10, name: "Use session lock with pattern-hiding displays", controls: [END-02], anchor: "AC-11"}
      - {id: 3.1.11, name: "Terminate user sessions automatically after a defined condition", controls: [IAM-04], anchor: "AC-12"}
      - {id: 3.1.12, name: "Monitor and control remote access sessions", controls: [NET-02], anchor: "AC-17"}
      - {id: 3.1.13, name: "Employ cryptographic mechanisms for remote access confidentiality", controls: [NET-02, CRY-01], anchor: "AC-17(2); SC-8"}
      - {id: 3.1.14, name: "Route remote access via managed access control points", controls: [NET-02], anchor: "AC-17(3)"}
      - {id: 3.1.15, name: "Authorize remote execution of privileged commands", controls: [NET-02, IAM-03], anchor: "AC-17(4); AC-6"}
      - {id: 3.1.16, name: "Authorize wireless access before enabling connections", controls: [NET-01], anchor: "AC-18", note: "corporate-office scope; production is cloud"}
      - {id: 3.1.17, name: "Protect wireless access using authentication and encryption", controls: [NET-01, CRY-01], anchor: "AC-18(1); SC-13"}
      - {id: 3.1.18, name: "Control connection of mobile devices", controls: [END-02], anchor: "AC-19"}
      - {id: 3.1.19, name: "Encrypt CUI on mobile devices and platforms", controls: [END-02, CRY-01], anchor: "AC-19(5); SC-28"}
      - {id: 3.1.20, name: "Verify and control connections to external systems", controls: [TPM-01, TPM-02], anchor: "AC-20 via SA-9"}
      - {id: 3.1.21, name: "Limit use of portable storage devices on external systems", controls: [END-02, DCH-01], anchor: "AC-20(2)"}
      - {id: 3.1.22, name: "Control CUI posted or processed on publicly accessible systems", controls: [DCH-01], anchor: "AC-22"}

  - family: "3.2"
    name: Awareness and Training
    evidence_sources: "Drata training assignment and completion records; role-based curricula for engineering and incident-response staff"
    requirements:
      - {id: 3.2.1, name: "Ensure personnel are aware of security risks and applicable policies", controls: [SAT-02], anchor: "AT-2"}
      - {id: 3.2.2, name: "Train personnel to carry out assigned security duties", controls: [SAT-02], anchor: "AT-3"}
      - {id: 3.2.3, name: "Provide insider-threat awareness training", controls: [SAT-02], anchor: "AT-2(2)"}

  - family: "3.3"
    name: Audit and Accountability
    evidence_sources: "AWS CloudTrail and centralized log platform; Drata monitor results; alert routing lands in Mattermost channels natively"
    requirements:
      - {id: 3.3.1, name: "Create and retain audit logs to enable monitoring and investigation", controls: [MON-01], anchor: "AU-2"}
      - {id: 3.3.2, name: "Ensure actions of individual users are uniquely traceable", controls: [MON-01, IAM-01], anchor: "AU-2; AC-2"}
      - {id: 3.3.3, name: "Review and update logged events", controls: [MON-01], anchor: "AU-2(3)"}
      - {id: 3.3.4, name: "Alert on audit logging process failure", controls: [MON-01], anchor: "AU-5"}
      - {id: 3.3.5, name: "Correlate audit review and reporting for indications of attack", controls: [MON-01], anchor: "AU-6(3)"}
      - {id: 3.3.6, name: "Provide audit record reduction and report generation", controls: [MON-01], anchor: "AU-7"}
      - {id: 3.3.7, name: "Synchronize system clocks to an authoritative time source", controls: [MON-02], anchor: "AU-8"}
      - {id: 3.3.8, name: "Protect audit information and tools from unauthorized access or deletion", controls: [MON-02], anchor: "AU-9"}
      - {id: 3.3.9, name: "Limit audit logging management to a privileged subset of users", controls: [MON-02, IAM-03], anchor: "AU-9(4); AC-6"}

  - family: "3.4"
    name: Configuration Management
    evidence_sources: "GitHub as the change record (the product monorepo runs 86 CI workflows; the merge record is the approval evidence); IaC baselines; MDM for endpoint configuration"
    requirements:
      - {id: 3.4.1, name: "Establish and maintain baseline configurations and system inventories", controls: [CHG-02-BASELINE, AST-01], anchor: "CM-2; CM-8"}
      - {id: 3.4.2, name: "Establish and enforce security configuration settings", controls: [CHG-02-BASELINE], anchor: "CM-6"}
      - {id: 3.4.3, name: "Track, review, approve, and log system changes", controls: [CHG-02], anchor: "CM-3"}
      - {id: 3.4.4, name: "Analyze the security impact of changes before implementation", controls: [CHG-02], anchor: "CM-4"}
      - {id: 3.4.5, name: "Define and enforce access restrictions for change", controls: [CHG-02], anchor: "CM-5"}
      - {id: 3.4.6, name: "Employ least functionality; essential capabilities only", controls: [CHG-02-BASELINE], anchor: "CM-7 via CM-6"}
      - {id: 3.4.7, name: "Restrict nonessential programs, functions, ports, protocols, and services", controls: [CHG-02-BASELINE, NET-01], anchor: "CM-7(1); SC-7"}
      - {id: 3.4.8, name: "Apply deny-by-exception policy for unauthorized software", controls: [END-02], anchor: "CM-7(4)/(5) via CM-6"}
      - {id: 3.4.9, name: "Control and monitor user-installed software", controls: [END-02], anchor: "CM-11 via CM-6"}

  - family: "3.5"
    name: Identification and Authentication
    evidence_sources: "IdP configuration exports (MFA policy, password policy, session settings); service-account inventory; Drata identity monitors"
    requirements:
      - {id: 3.5.1, name: "Identify system users, processes, and devices", controls: [IAM-01, IAM-05], anchor: "IA-2 via AC-2; IA-5(5)"}
      - {id: 3.5.2, name: "Authenticate identities as a prerequisite to access", controls: [IAM-04], anchor: "IA-2"}
      - {id: 3.5.3, name: "Use MFA for privileged accounts and network access to non-privileged accounts", controls: [IAM-04], anchor: "IA-2(1)/(2)", note: "partial credit: 3 of 5 points if general users lack MFA"}
      - {id: 3.5.4, name: "Employ replay-resistant authentication", controls: [IAM-04], anchor: "IA-2(8)"}
      - {id: 3.5.5, name: "Prevent reuse of identifiers for a defined period", controls: [IAM-01], anchor: "IA-4 via AC-2"}
      - {id: 3.5.6, name: "Disable identifiers after a defined period of inactivity", controls: [IAM-01, IAC-17], anchor: "IA-4 / AC-2(3)"}
      - {id: 3.5.7, name: "Enforce minimum password complexity and change of characters", controls: [IAM-04], anchor: "IA-5(1)"}
      - {id: 3.5.8, name: "Prohibit password reuse for a specified number of generations", controls: [IAM-04], anchor: "IA-5(1)"}
      - {id: 3.5.9, name: "Allow temporary passwords only with immediate change to permanent", controls: [IAM-04], anchor: "IA-5(1)"}
      - {id: 3.5.10, name: "Store and transmit only cryptographically protected passwords", controls: [IAM-04, CRY-01], anchor: "IA-5(1); SC-13"}
      - {id: 3.5.11, name: "Obscure feedback of authentication information", controls: [IAM-04], anchor: "IA-6"}

  - family: "3.6"
    name: Incident Response
    evidence_sources: "Jira incident tickets and postmortems; IR plan and tabletop records; DIBNet reporting procedure (72-hour clock under DFARS 252.204-7012)"
    requirements:
      - {id: 3.6.1, name: "Establish operational incident-handling capability", controls: [IRO-01], anchor: "IR-4; IR-8"}
      - {id: 3.6.2, name: "Track, document, and report incidents to officials and authorities", controls: [IRO-01, IRO-02], anchor: "IR-6", note: "for a DIB contractor this includes the DFARS 7012 72-hour DIBNet report"}
      - {id: 3.6.3, name: "Test the incident response capability", controls: [IRO-01], anchor: "IR-3 via IR-8"}

  - family: "3.7"
    name: Maintenance
    evidence_sources: "MDM maintenance and patch records for corporate endpoints; AWS shared-responsibility documentation for production infrastructure"
    family_note: "Honest engine gap: no dedicated maintenance family exists in the Living Control Set; rows below are nearest-fit. For a cloud-native boundary most physical-system maintenance inherits from the CSP, and the day-one boundary decision determines how much of 3.7 stays in scope. A dedicated MA-01 owned control is the identified engine extension."
    requirements:
      - {id: 3.7.1, name: "Perform maintenance on organizational systems", controls: [END-02, VPM-01], anchor: "nearest-fit via CM-6/SI-2", note: "production hardware maintenance inherits from AWS"}
      - {id: 3.7.2, name: "Control tools, techniques, and personnel used for maintenance", controls: [END-02], anchor: "nearest-fit via CM-6", note: "production hardware maintenance inherits from AWS"}
      - {id: 3.7.3, name: "Sanitize equipment of CUI before off-site maintenance", controls: [AST-03], anchor: "MP-6"}
      - {id: 3.7.4, name: "Check diagnostic media for malicious code before use", controls: [END-01], anchor: "SI-3"}
      - {id: 3.7.5, name: "Require MFA for nonlocal maintenance sessions", controls: [IAM-04, NET-02], anchor: "IA-2(1); AC-17"}
      - {id: 3.7.6, name: "Supervise maintenance activities of personnel without required access", controls: [HRS-01, PES-01], anchor: "PS-6; PE-2"}

  - family: "3.8"
    name: Media Protection
    evidence_sources: "MDM removable-media policy enforcement; sanitization certificates; AWS inherits physical media handling for production; backup encryption configuration"
    requirements:
      - {id: 3.8.1, name: "Protect system media containing CUI, paper and digital", controls: [DCH-01, AST-03], anchor: "MP-6; AC-4", note: "cloud-hosted CUI: physical media largely inherited from AWS"}
      - {id: 3.8.2, name: "Limit access to CUI on system media to authorized users", controls: [DCH-01], anchor: "nearest-fit via AC-4", note: "inherited for production media"}
      - {id: 3.8.3, name: "Sanitize or destroy media containing CUI before disposal or reuse", controls: [AST-03], anchor: "MP-6"}
      - {id: 3.8.4, name: "Mark media with CUI markings and distribution limitations", controls: [AST-02], anchor: "MP-3"}
      - {id: 3.8.5, name: "Control access to and accountability for media during transport", controls: [DCH-01], anchor: "nearest-fit", note: "inherited for production; corporate scope is device transport under MDM"}
      - {id: 3.8.6, name: "Use cryptography to protect CUI on media during transport", controls: [CRY-01], anchor: "SC-28"}
      - {id: 3.8.7, name: "Control the use of removable media on system components", controls: [END-02], anchor: "nearest-fit via CM-6 endpoint policy"}
      - {id: 3.8.8, name: "Prohibit portable storage devices with no identifiable owner", controls: [END-02], anchor: "nearest-fit via CM-6 endpoint policy"}
      - {id: 3.8.9, name: "Protect the confidentiality of backup CUI at storage locations", controls: [BCD-02, CRY-01], anchor: "CP-9; SC-28"}

  - family: "3.9"
    name: Personnel Security
    evidence_sources: "HRIS screening records joined to IdP deprovisioning timestamps (the joiner-mover-leaver record); signed agreements in Drata"
    requirements:
      - {id: 3.9.1, name: "Screen individuals prior to authorizing access to CUI systems", controls: [HRS-01], anchor: "PS-3"}
      - {id: 3.9.2, name: "Protect CUI systems during and after personnel actions", controls: [HRS-01, IAM-01], anchor: "PS-4; PS-5"}

  - family: "3.10"
    name: Physical Protection
    evidence_sources: "Office badge and visitor records; AWS SOC 2 / FedRAMP packages inherit production data-center physical security; remote-work standard under MDM"
    family_note: "Production physical protection inherits from AWS. Corporate offices and the remote-first workforce (3.10.6) remain squarely in scope and are where the assessment work actually lands."
    requirements:
      - {id: 3.10.1, name: "Limit physical access to systems and environments to authorized individuals", controls: [PES-01], anchor: "PE-2"}
      - {id: 3.10.2, name: "Protect and monitor the physical facility and support infrastructure", controls: [PES-01], anchor: "PE-3; PE-6"}
      - {id: 3.10.3, name: "Escort visitors and monitor visitor activity", controls: [PES-01], anchor: "PE-3"}
      - {id: 3.10.4, name: "Maintain audit logs of physical access", controls: [PES-01], anchor: "PE-6 (access logs)"}
      - {id: 3.10.5, name: "Control and manage physical access devices", controls: [PES-01], anchor: "PE-3"}
      - {id: 3.10.6, name: "Enforce safeguarding measures for CUI at alternate work sites", controls: [PES-01, END-02], anchor: "PE-17 nearest-fit; CM-6", note: "remote-first workforce makes this a primary, not peripheral, requirement"}

  - family: "3.11"
    name: Risk Assessment
    evidence_sources: "Risk register with FAIR quantification; vulnerability scanner output (Dependabot, dependency and container scanning already visible in their public CI)"
    requirements:
      - {id: 3.11.1, name: "Periodically assess risk to operations, assets, and individuals", controls: [RSK-01], anchor: "RA-3"}
      - {id: 3.11.2, name: "Scan for vulnerabilities periodically and when new ones are identified", controls: [VPM-01, VPM-02], anchor: "RA-5"}
      - {id: 3.11.3, name: "Remediate vulnerabilities in accordance with risk assessments", controls: [VPM-01], anchor: "SI-2 via RA-5"}

  - family: "3.12"
    name: Security Assessment
    evidence_sources: "Assessment workpapers; POA&M as the risk-treatment register; continuous-monitoring dashboards; the SSP itself"
    requirements:
      - {id: 3.12.1, name: "Periodically assess security controls for effectiveness", controls: [GOV-04, VPM-02], anchor: "CA-7 (GOV-04); CA-8 (VPM-02)"}
      - {id: 3.12.2, name: "Develop and implement POA&Ms to correct deficiencies", controls: [RSK-02], anchor: "CA-5"}
      - {id: 3.12.3, name: "Monitor security controls on an ongoing basis", controls: [MON-01, GOV-04], anchor: "CA-7"}
      - {id: 3.12.4, name: "Develop, document, and periodically update system security plans", controls: [GOV-01, GOV-02], anchor: "PL-2 via PM-1/PL-1", note: "unscored in SPRS because an absent SSP means the assessment cannot be conducted; this is the precondition artifact"}

  - family: "3.13"
    name: System and Communications Protection
    evidence_sources: "AWS network configuration (security groups, VPC boundaries) as computed evidence; TLS and KMS configuration; the product itself ships FIPS-validated cryptography and STIG-hardened images (v11)"
    requirements:
      - {id: 3.13.1, name: "Monitor, control, and protect communications at system boundaries", controls: [NET-01], anchor: "SC-7"}
      - {id: 3.13.2, name: "Employ architectural designs and engineering principles that promote security", controls: [SDLC-01], anchor: "SA-8"}
      - {id: 3.13.3, name: "Separate user functionality from system management functionality", controls: [NET-01, IAM-03], anchor: "SC-2 nearest; AC-6"}
      - {id: 3.13.4, name: "Prevent unauthorized information transfer via shared system resources", controls: [NET-01], anchor: "SC-4 nearest", note: "hypervisor-level isolation inherits from AWS"}
      - {id: 3.13.5, name: "Implement subnetworks for publicly accessible components", controls: [NET-01], anchor: "SC-7"}
      - {id: 3.13.6, name: "Deny network traffic by default; allow by exception", controls: [NET-01], anchor: "SC-7(5)"}
      - {id: 3.13.7, name: "Prevent split tunneling for remote devices", controls: [NET-02], anchor: "SC-7(7) via AC-17"}
      - {id: 3.13.8, name: "Use cryptography to prevent unauthorized disclosure of CUI in transit", controls: [CRY-01], anchor: "SC-8"}
      - {id: 3.13.9, name: "Terminate network connections after sessions end or defined inactivity", controls: [NET-02], anchor: "SC-10 via AC-17"}
      - {id: 3.13.10, name: "Establish and manage cryptographic keys", controls: [CRY-02], anchor: "SC-12"}
      - {id: 3.13.11, name: "Employ FIPS-validated cryptography to protect CUI confidentiality", controls: [CRY-01], anchor: "SC-13", note: "partial credit: 3 of 5 points if cryptography is mostly not FIPS-validated. Mattermost ships a FIPS-mode product offering, which makes the corporate-boundary question precise rather than novel"}
      - {id: 3.13.12, name: "Prohibit remote activation of collaborative computing devices", controls: [END-02], anchor: "SC-15 nearest-fit", note: "product-relevant for a collaboration platform; corporate scope is endpoint camera/mic policy"}
      - {id: 3.13.13, name: "Control and monitor the use of mobile code", controls: [END-01], anchor: "SC-18 via SI-3"}
      - {id: 3.13.14, name: "Control and monitor the use of VoIP technologies", controls: [NET-01], anchor: "SC-19 nearest-fit", note: "product-relevant: Mattermost Calls is VoIP; corporate boundary treats it as a governed communication service"}
      - {id: 3.13.15, name: "Protect the authenticity of communications sessions", controls: [CRY-01], anchor: "SC-23 via SC-8"}
      - {id: 3.13.16, name: "Protect the confidentiality of CUI at rest", controls: [CRY-01, DCH-01], anchor: "SC-28"}

  - family: "3.14"
    name: System and Information Integrity
    evidence_sources: "EDR deployment records; advisory-monitoring runbook (their own published Product Vulnerability Process is the model); SIEM detections routed to Mattermost channels"
    requirements:
      - {id: 3.14.1, name: "Identify, report, and correct system flaws in a timely manner", controls: [VPM-01], anchor: "SI-2"}
      - {id: 3.14.2, name: "Provide protection from malicious code at designated locations", controls: [END-01], anchor: "SI-3"}
      - {id: 3.14.3, name: "Monitor security alerts and advisories; take action in response", controls: [VPM-01, MON-01], anchor: "SI-5 via SI-2/AU-6"}
      - {id: 3.14.4, name: "Update malicious code protection mechanisms when new releases are available", controls: [END-01], anchor: "SI-3"}
      - {id: 3.14.5, name: "Perform periodic and real-time scans of systems and files", controls: [END-01, VPM-01], anchor: "SI-3; RA-5"}
      - {id: 3.14.6, name: "Monitor communications traffic for attacks and indicators", controls: [MON-01, NET-01], anchor: "SI-4; SC-7"}
      - {id: 3.14.7, name: "Identify unauthorized use of organizational systems", controls: [MON-01], anchor: "SI-4"}
