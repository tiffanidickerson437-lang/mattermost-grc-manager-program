# =============================================================================
# FedRAMP 20x Key Security Indicators -> Living Control Set mapping.
# Single source of truth; the rendered KSI map generates from this file.
#
# BASIS (primary, version-stamped):
#   - KSI set: FedRAMP Consolidated Rules for 2026 (CR26), official launch
#     2026-06-24, pulled from the FedRAMP/2026-markdown repository
#     (reference/key-security-indicators.md): 46 KSIs across 10 categories.
#     This is the CURRENT authority and supersedes the older 20x Phase 2
#     counts (56 Low / 61 Moderate) that circulate in vendor blogs; some KSIs
#     carry per-class variants (a few are Optional at Class B), noted where
#     they change the reading.
#   - Anchor: CR26 publishes Related SP 800-53 Controls per KSI, and every
#     Living Control Set control carries 800-53 references. Each mapping row
#     is first computed from that shared-800-53 overlap, then curated by
#     judgment; basis says which. The raw computed candidate lists are
#     preserved in the generation data so curation is auditable.
#
# COVERAGE VOCABULARY:
#   covered - the engine control's operating behavior satisfies the KSI's
#             persistent-review/automation intent
#   partial - a real control exists and a named modernization delta remains;
#             the delta is the work, stated plainly
#   Nothing is scored "met" for any company here. Coverage describes the
#   ENGINE's control set, never Mattermost's implementation state.
# =============================================================================

metadata:
  framework_key: fedramp_20x_ksi
  framework_name: "FedRAMP 20x Key Security Indicators (CR26 2026-06-24)"
  ksi_count: 46
  source: "github.com/FedRAMP/2026-markdown reference/key-security-indicators.md"
  basis_checked: 2026-07-17
  summary: {covered: 39, partial: 7, unaddressed: 0}

categories:
  - category: Cybersecurity Education
    ksis:
      - {id: KSI-CED-RAT, title: Reviewing All Training, coverage: covered, controls: [SAT-02, HRS-01], basis: computed}

  - category: Change Management
    ksis:
