      - {id: KSI-CNA-EIS, title: Enforcing Intended State, coverage: covered, controls: [MON-01, CHG-02-BASELINE, GOV-04], basis: mixed, note: "the drift-opens-a-ticket loop is this KSI's exact mechanism"}
      - {id: KSI-CNA-IBP, title: Implementing Best Practices, coverage: covered, controls: [CHG-02-BASELINE, NET-02], basis: computed}
      - {id: KSI-CNA-MAT, title: Minimizing Attack Surface, coverage: covered, controls: [NET-01, CRY-01], basis: computed}
      - {id: KSI-CNA-OFA, title: Optimizing for Availability, coverage: partial, controls: [BCD-01, NET-01], basis: judgment, note: "delta: the control set is confidentiality-weighted; availability engineering (autoscaling, load-shedding review) is a named extension"}
      - {id: KSI-CNA-RNT, title: Restricting Network Traffic, coverage: covered, controls: [NET-01], basis: computed}
      - {id: KSI-CNA-RVP, title: Reviewing Protections, coverage: partial, controls: [NET-01, MON-01], basis: judgment, note: "delta: DoS-protection effectiveness review (SC-5) has no dedicated engine control; boundary + monitoring carry it today"}
      - {id: KSI-CNA-ULN, title: Using Logical Networking, coverage: covered, controls: [NET-01], basis: computed}

