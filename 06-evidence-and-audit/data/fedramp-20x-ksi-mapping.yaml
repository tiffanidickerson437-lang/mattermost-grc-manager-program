      - {id: KSI-CMT-RMV, title: Redeploying vs Modifying, coverage: covered, controls: [CHG-02-BASELINE, CHG-02], basis: computed, note: "the engine's GitHub-native operating model is exactly this: version-controlled redeploy over direct modification"}
      - {id: KSI-CMT-RVP, title: Reviewing Change Procedures, coverage: covered, controls: [CHG-02], basis: computed}
      - {id: KSI-CMT-VTD, title: Validating Throughout Deployment, coverage: covered, controls: [CHG-02, VPM-01, SDLC-01], basis: mixed}

  - category: Cloud Native Architecture
    ksis:
