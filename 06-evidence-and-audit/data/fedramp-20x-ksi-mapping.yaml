      - {id: KSI-IAM-SNU, title: Securing Non-User Authentication, coverage: covered, controls: [IAM-05, SDLC-03], basis: computed, note: "the engine carries a dedicated non-human-identity control; most programs bolt this on later"}
      - {id: KSI-IAM-SUS, title: Responding to Suspicious Activity, coverage: covered, controls: [IAC-17, MON-01, IAM-01], basis: mixed}

