# =============================================================================
# DoW CIO "Brilliant at the Basics" IT Top 10 -> NIST SP 800-171 Rev 2 ->
# Living Control Set. Single source of truth for the conformance map.
#
# WHY THIS FILE EXISTS
#   On 2026-07-13 the DoW CIO suspended CMMC Phase II. The same CIO office
#   publishes "Brilliant at the Basics" — a Top 10 of IT practices it tells the
#   Defense Industrial Base to actually do, explicitly framed as stripping away
#   "administrative complexity and compliance overhead." It is not a framework,
#   carries no assessment, and appears in no contract clause. It is the clearest
#   public statement of what the customer thinks good looks like, published by
#   the office that just took the credential away.
#
#   That makes it the right lens to run alongside 800-171, not instead of it.
#
# HOW IT RESOLVES — the rule this file obeys
#   This file declares ONLY: practice -> 800-171 requirement IDs. It never names
#   a control directly for a practice that 800-171 can reach. Controls are
#   RESOLVED at render time through nist-800-171-rev2-mapping.yaml, so the
#   control assignment is stated exactly once in this repo and cannot drift
#   between the workbook view and this view.
#
#   `unreachable_controls` is the deliberate exception, and the point of the
#   whole artifact: controls that ARE in scope for Mattermost but that no
#   800-171 requirement resolves to. Declaring them here is how the gap becomes
#   computable instead of rhetorical.
#
# BASIS (primary, verified 2026-07-17)
#   - Practices: https://dowcio.war.gov/BrilliantBasics/ — IT Top 10, verbatim
#     titles; the quoted text in `dow_says` is the campaign's own wording.
#   - Requirement set: NIST SP 800-171 Rev 2, as mapped in this repo's
#     nist-800-171-rev2-mapping.yaml (110 requirements, the enforced baseline
#     under the Phase II suspension).
#   - Control set: generated/in-scope-controls.yaml (45 controls in scope for
#     Mattermost, rendered from generated/companies/mattermost/mattermost.config.yaml).
#
# NOT CLAIMED: nothing here asserts Mattermost's implementation state of any
#   practice. Conformance is assessed on day one, inside the boundary, from
#   systems of record. This file computes REACHABILITY — whether the 800-171
#   lens can see a practice at all — which is knowable from public documents.
# =============================================================================

metadata:
  source_name: "DoW CIO — Brilliant at the Basics, IT cybersecurity top 10"
  source_url: "https://dowcio.war.gov/BrilliantBasics/"
  source_checked: 2026-07-17
  publisher: "Department of War, Office of the Chief Information Officer"
  audience: "Defense Industrial Base partners"
  status: "guidance — not a framework, not assessed, not in any contract clause"
  resolves_through: "nist-800-171-rev2-mapping.yaml"
  control_set: "generated/in-scope-controls.yaml"

practices:
  - num: "01"
    name: "Phishing-Resistant Multi-Factor Authentication (MFA)"
    dow_says: >-
      Upgrade your authentication mechanisms to require strong phishing-resistant
      MFA methods for user accounts. Moving away from legacy MFA methods such as
      SMS text messages or push notifications forms the foundation of a modern
      security stack.
    reqs: ["3.5.3"]
    note: >-
      Reachable, but not equivalent. 800-171 3.5.3 requires MFA; it does not
      require it to be phishing-resistant. A contractor using SMS OTP satisfies
      3.5.3 in full and fails this practice outright. The requirement is a floor
      the practice has already moved past — worth naming in the interview, since
      it is the same shape as the AI gap below but subtler.

  - num: "02"
    name: "Comprehensive Asset Inventory Management"
    dow_says: >-
      Establish and maintain a dynamically updated inventory of enterprise
      assets, including hardware, software, identities, and data across your
      estate. An effective inventory goes beyond a simple static list.
    reqs: ["3.4.1"]
    note: >-
      Reachable. Note the scope widening: 800-171 3.4.1 inventories system
      components; this practice explicitly includes identities and data. IAM-05
      (service and non-human identity governance) is what carries the identity
      half, and 800-171 does not reach it for inventory purposes.

  - num: "03"
    name: "Strategic Technical Debt Reduction"
    dow_says: >-
      Minimize your attack surface by aggressively identifying, modernizing,
      consolidating, or retiring unused legacy infrastructure, redundant data
      stores, unsupported software, and unnecessary interfaces.
    reqs: ["3.4.6", "3.4.7", "3.4.8", "3.4.9"]
    note: >-
      Reachable through the least-functionality family. The practice is the
      offensive framing of the same idea 800-171 states defensively.

  - num: "04"
    name: "Flexible Technology Stack"
    dow_says: >-
      Design and maintain a flexible, interoperable stack that supports modular
      integration of best-in-class commercial technologies. Prioritize open
      standards... mitigates the strategic risk of being locked into a single
      proprietary vendor ecosystem.
    reqs: []
    unreachable_controls: []
    gap_class: not-a-control
    note: >-
      Unreachable, and correctly so. This is procurement and architecture
      strategy, not a security control, and no control framework should carry
      it. Recorded here rather than dropped because an honest map has to
      distinguish "the framework has a blind spot" from "this was never a
      control" — collapsing the two is how conformance maps inflate.
      Worth noting for a different reason: Mattermost is open source, deploys
      via Platform One, and sells against exactly the lock-in this describes.
      They conform to it as a product thesis, not as a control.

  - num: "05"
    name: "Logical Segmentation to Limit Adversary Lateral Movement"
    dow_says: >-
      Implement software-defined segmentation to divide your environment into
      secure, isolated logical zones... Restricting lateral pathways limits the
      "blast radius" of any compromise.
    reqs: ["3.13.1", "3.13.5", "3.4.7"]
    note: "Reachable."

  - num: "06"
    name: "Risk-Based Vulnerability Management"
    dow_says: >-
      Establish a continuous, risk-based vulnerability management program driven
      by operational context and impact rather than generic severity scores.
      Replace flat patching cycles by prioritizing remediation actions based on
      the actual exploitability of a vulnerability.
    reqs: ["3.11.2", "3.11.3", "3.14.1"]
    note: >-
      Reachable, and Mattermost's public posture is strong here — their Product
      Vulnerability Process (intake -> CVSS 3.1 -> SLA -> backport -> CVE via
      cvelib -> 30-day disclosure) is public and rigorous, and they consistently
      self-score above NVD. This is the practice they would pass most easily.

  - num: "07"
    name: "Integrate Security Early in the Development Lifecycle"
    dow_says: >-
      Integrate secure coding standards and automated vulnerability scanning
      directly into the earliest phases of your engineering lifecycle... testing
      software components, including all third-party dependencies.
    reqs: ["3.13.2"]
    note: >-
      Barely reachable. 3.13.2 (architectural security principles, anchored to
      SA-8) is the only 800-171 requirement in the neighbourhood, and it is a
      design-principles statement, not a pipeline requirement. The DevSecOps
      substance of this practice lives in 800-53 SA-11/SA-15, which 800-171 r2
      does not import. Flagged as thin rather than counted as clean.

  - num: "08"
    name: "Secure AI Adoption and Data Protection"
    dow_says: >-
      Establish clear policies and technical guardrails governing the use of
      artificial intelligence and automation tools across your workforce.
      Explicitly prohibit the input of sensitive Department data into public,
      commercial AI systems. By implementing content filtering, endpoint
      controls, and approved enterprise AI environments, you prevent accidental
      data exposure while enabling the safe adoption of advanced technologies.
    reqs: []
    unreachable_controls: ["AAT-01", "AAT-02"]
    gap_class: framework-blind-spot
    note: >-
      THE FINDING. Unreachable, and it is a control, and the controls are
      already in scope.

      NIST SP 800-171 Rev 2 contains no artificial-intelligence requirement.
      Not a weak one — none. Rev 2 was published in February 2020; the 110
      requirements predate the workforce LLM entirely, and Rev 3 does not add
      one either. So a contractor can score a perfect 110 in SPRS, sign the
      32 CFR 170.22 affirmation, and be wholly non-conformant with a practice
      the same CIO office publishes as a Top 10 basic for the DIB.

      The score is not wrong. The lens has a blind spot, and the credential
      cannot see through it.

      AAT-01 (AI and autonomous technologies governance) and AAT-02 (model and
      prompt change management) are already in Mattermost's 45 in-scope
      controls — fired by `ai-products: true` in the config, and satisfying
      NIST AI RMF 1.0 and ISO/IEC 42001:2023. The control set can see this
      practice. The 800-171 view of that same control set cannot.

      That is the argument for one control set rendered into many frameworks,
      made by the customer's own CIO rather than by me.

  - num: "09"
    name: "Resilient Backup and Disaster Recovery Architecture"
    dow_says: >-
      Protect critical data from adversarial destruction and ransomware by
      establishing a secure, immutable backup architecture... Ensure these
      backups are secure using isolated credentials distinct from your primary
      network... Regularly conduct full-system restoration drills.
    reqs: ["3.8.9"]
    note: >-
      Reachable but thin, in the same shape as practice 01. 3.8.9 requires
      backup confidentiality at storage locations. It does not require
      immutability, credential isolation, or restoration drills — the three
      things that actually defeat ransomware, and the three things this practice
      is entirely about. BCD-01 (business continuity and disaster recovery)
      carries the drill obligation; 800-171 does not reach BCD-01 at all.

  - num: "10"
    name: "Continuous Technical Workforce Readiness"
    dow_says: >-
      Continuously develop your technical and security personnel on modern
      enterprise architecture, data protection, and defensive security
      operations. Operational resilience is directly bottlenecked by workforce
      capability.
    reqs: ["3.2.1", "3.2.2"]
    note: "Reachable."

# -----------------------------------------------------------------------------
# The OT Top 10 is deliberately not mapped.
#
# It governs PLCs, RTUs, HMIs, SCADA and safety-instrumented systems. Mattermost
# is a software company with no operational technology in its boundary, so
# mapping it would manufacture ten findings out of nothing and is exactly the
# padding this repo exists to argue against. Recorded as considered-and-excluded
# rather than silently omitted.
#
# One OT practice is in scope by a different route: #09 Supply Chain Security.
# It is already carried by TPM-01/TPM-02 and reachable via 800-171 3.1.20, and
# it matters here because Mattermost ships through Iron Bank / Repo1 under DSOP.
# Whether those hardening artifacts are owned by Mattermost's security team or
# by DSOP is an open question this repo cannot resolve from outside.
# -----------------------------------------------------------------------------
